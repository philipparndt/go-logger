name: Build

on:
  push:
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          go build .

      - name: Test
        run: |
          go test ./...

      - name: Build submodules
        run: |
          (cd chi && go build ./...)
          (cd otel && go build ./...)
